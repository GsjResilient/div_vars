<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__AIG_TITLE__ | AIG Partition Map</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f5;
      --surface: #ffffff;
      --surface-soft: #f7f9fb;
      --ink: #17212b;
      --muted: #66717d;
      --line: #d7dee5;
      --line-strong: #aeb8c2;
      --critical: #d43f3f;
      --critical-soft: #fff0ef;
      --focus: #155e75;
      --shadow: 0 8px 24px rgba(24, 37, 51, 0.12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    button, input { font: inherit; }

    button {
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover { border-color: var(--line-strong); background: var(--surface-soft); }
    button:focus-visible, input:focus-visible { outline: 2px solid #0e7490; outline-offset: 2px; }

    .app-header {
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      z-index: 4;
    }

    .brand {
      min-width: 190px;
      max-width: 300px;
    }

    .brand h1 {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .toolbar {
      min-width: 0;
      display: flex;
      align-items: center;
      flex: 1;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-form {
      display: flex;
      align-items: center;
      height: 34px;
    }

    .search-form input {
      width: 150px;
      height: 34px;
      padding: 0 10px;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: 4px 0 0 4px;
    }

    .search-form button {
      height: 34px;
      padding: 0 12px;
      border-left: 0;
      border-radius: 0 4px 4px 0;
      font-size: 12px;
      font-weight: 650;
    }

    .icon-group, .segmented {
      display: inline-flex;
      height: 34px;
    }

    .icon-button {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      padding: 0;
      border-radius: 0;
      font-size: 18px;
      line-height: 1;
    }

    .icon-group .icon-button:first-child, .segmented button:first-child { border-radius: 4px 0 0 4px; }
    .icon-group .icon-button:last-child, .segmented button:last-child { border-radius: 0 4px 4px 0; }
    .icon-group .icon-button + .icon-button, .segmented button + button { border-left: 0; }

    .segmented button {
      min-width: 54px;
      height: 34px;
      padding: 0 10px;
      border-radius: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .segmented button.active {
      color: #ffffff;
      background: #176b7d;
      border-color: #176b7d;
    }

    .check-control {
      height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .check-control input { accent-color: #176b7d; }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      position: relative;
    }

    .canvas-shell {
      min-width: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    #graph-canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
    }

    #graph-canvas.dragging { cursor: grabbing; }

    .canvas-status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      max-width: min(520px, calc(100% - 24px));
      min-height: 28px;
      display: flex;
      align-items: center;
      padding: 5px 9px;
      color: #46515c;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(24, 37, 51, 0.08);
      font-size: 11px;
      pointer-events: none;
    }

    .graph-tooltip {
      position: absolute;
      z-index: 5;
      min-width: 118px;
      max-width: 240px;
      padding: 7px 9px;
      color: #ffffff;
      background: rgba(19, 28, 37, 0.94);
      border-radius: 4px;
      box-shadow: var(--shadow);
      font-size: 11px;
      line-height: 1.45;
      pointer-events: none;
    }

    .graph-tooltip[hidden] { display: none; }

    .inspector {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      background: var(--surface);
      border-left: 1px solid var(--line);
      z-index: 3;
    }

    .panel-section {
      padding: 14px 15px;
      border-bottom: 1px solid var(--line);
    }

    .panel-section h2 {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 750;
      line-height: 1.25;
      letter-spacing: 0;
      text-transform: none;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
    }

    .metric strong {
      display: block;
      font-size: 18px;
      line-height: 1.15;
      font-variant-numeric: tabular-nums;
    }

    .metric span, .detail-label {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.3;
    }

    .legend-list {
      display: grid;
      gap: 7px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4e5965;
      font-size: 11px;
    }

    .legend-swatch {
      width: 11px;
      height: 11px;
      flex: 0 0 auto;
      border: 1px solid rgba(23, 33, 43, 0.25);
      border-radius: 2px;
    }

    .legend-line {
      width: 18px;
      height: 0;
      flex: 0 0 auto;
      border-top: 2px solid var(--critical);
    }

    .empty-detail {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .detail-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .detail-title strong { font-size: 16px; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      color: #47515b;
      background: #edf1f4;
      font-size: 10px;
      font-weight: 700;
    }

    .status-badge.critical { color: #9f2424; background: var(--critical-soft); }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px 12px;
      margin-bottom: 12px;
    }

    .detail-value {
      overflow-wrap: anywhere;
      font-size: 12px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .connection-group + .connection-group { margin-top: 11px; }
    .connection-group h3 { margin: 0 0 6px; color: var(--muted); font-size: 10px; }

    .connection-list {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .connection-button {
      min-height: 26px;
      padding: 3px 7px;
      color: #35414c;
      background: var(--surface-soft);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .connection-button.cut {
      color: #a12828;
      background: var(--critical-soft);
      border-color: #efb2af;
    }

    .key-list {
      display: grid;
      margin: 0 -15px -14px;
    }

    .key-row {
      min-height: 38px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 6px 15px;
      color: var(--ink);
      background: transparent;
      border: 0;
      border-top: 1px solid #edf0f3;
      border-radius: 0;
      text-align: left;
    }

    .key-row:hover { background: var(--critical-soft); }
    .key-row strong { color: var(--critical); font-size: 12px; }
    .key-row span { color: var(--muted); font-size: 10px; }

    .drawer-toggle {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 6;
      width: 36px;
      height: 36px;
      place-items: center;
      padding: 0;
      box-shadow: var(--shadow);
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .app-header { align-items: flex-start; }
      .brand { min-width: 150px; max-width: 220px; padding-top: 2px; }
      .toolbar { gap: 6px; }
    }

    @media (max-width: 720px) {
      .app-header { display: grid; grid-template-columns: 1fr; gap: 7px; }
      .brand { max-width: none; }
      .brand p { display: none; }
      .toolbar { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; }
      .search-form input { width: 124px; }
      .workspace { grid-template-columns: minmax(0, 1fr); }
      .drawer-toggle { display: grid; }
      .inspector {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(330px, calc(100% - 48px));
        transform: translateX(102%);
        transition: transform 180ms ease;
        box-shadow: var(--shadow);
      }
      body.drawer-open .inspector { transform: translateX(0); }
      body.drawer-open .drawer-toggle { left: 6px; right: auto; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1 title="__AIG_TITLE__">__AIG_TITLE__</h1>
      <p>AIG Partition Map</p>
    </div>
    <div class="toolbar" aria-label="图操作">
      <form class="search-form" id="search-form">
        <input id="variable-search" inputmode="numeric" autocomplete="off" aria-label="AIG 变量编号" placeholder="变量编号">
        <button type="submit">定位</button>
      </form>
      <div class="icon-group" aria-label="缩放操作">
        <button class="icon-button" id="zoom-out" type="button" aria-label="缩小" title="缩小">-</button>
        <button class="icon-button" id="zoom-in" type="button" aria-label="放大" title="放大">+</button>
        <button class="icon-button" id="fit-view" type="button" aria-label="适应窗口" title="适应窗口">□</button>
        <button class="icon-button" id="reset-view" type="button" aria-label="重置视图" title="重置视图">↺</button>
      </div>
      <div class="segmented" id="focus-control" aria-label="邻域聚焦">
        <button type="button" data-depth="0" class="active">全图</button>
        <button type="button" data-depth="1">1-hop</button>
        <button type="button" data-depth="2">2-hop</button>
      </div>
      <label class="check-control"><input id="show-labels" type="checkbox" checked>标签</label>
      <label class="check-control"><input id="emphasize-cuts" type="checkbox" checked>割边</label>
    </div>
  </header>

  <main class="workspace">
    <section class="canvas-shell" aria-label="AIG 图画布">
      <canvas id="graph-canvas">当前浏览器不支持 Canvas。</canvas>
      <button class="drawer-toggle" id="drawer-toggle" type="button" aria-label="切换检查面板" title="切换检查面板">≡</button>
      <div class="canvas-status" id="canvas-status" aria-live="polite">正在准备图...</div>
      <div class="graph-tooltip" id="graph-tooltip" hidden></div>
    </section>

    <aside class="inspector" id="inspector" aria-label="变量检查面板">
      <section class="panel-section">
        <h2>图概览</h2>
        <div class="metric-grid" id="metric-grid"></div>
      </section>
      <section class="panel-section">
        <h2>图例</h2>
        <div class="legend-list" id="legend-list"></div>
      </section>
      <section class="panel-section" id="detail-section">
        <h2>变量详情</h2>
        <div id="selected-detail"><p class="empty-detail">点击节点或搜索变量编号。</p></div>
      </section>
      <section class="panel-section">
        <h2>关键变量 <span id="key-count"></span></h2>
        <div class="key-list" id="key-list"></div>
      </section>
    </aside>
  </main>

  <script id="aig-data" type="application/json">__AIG_DATA__</script>
  <script>
    (() => {
      "use strict";

      const DATA = JSON.parse(document.getElementById("aig-data").textContent);
      const isPartitionMode = DATA.mode !== "key-file";
      const keyVariables = DATA.keyVariables || DATA.cutVariables || [];
      const canvas = document.getElementById("graph-canvas");
      const shell = canvas.parentElement;
      const ctx = canvas.getContext("2d");
      const statusElement = document.getElementById("canvas-status");
      const tooltip = document.getElementById("graph-tooltip");
      const detailElement = document.getElementById("selected-detail");
      const partitionPalette = ["#2878b5", "#27966f", "#d4932f", "#5f6fca", "#168f9f", "#a4568b", "#6d8f31", "#b45c34"];
      const keyOf = value => String(value);
      const nodeMap = new Map(DATA.nodes.map(node => [keyOf(node.id), node]));
      const incoming = new Map();
      const outgoing = new Map();
      const adjacency = new Map();

      for (const node of DATA.nodes) {
        const key = keyOf(node.id);
        incoming.set(key, []);
        outgoing.set(key, []);
        adjacency.set(key, new Set());
      }
      for (const edge of DATA.edges) {
        const source = keyOf(edge.source);
        const target = keyOf(edge.target);
        if (!nodeMap.has(source) || !nodeMap.has(target)) continue;
        outgoing.get(source).push(edge);
        incoming.get(target).push(edge);
        adjacency.get(source).add(target);
        adjacency.get(target).add(source);
      }

      let cssWidth = 1;
      let cssHeight = 1;
      let pixelRatio = 1;
      let selectedId = null;
      let hoveredId = null;
      let focusDepth = 0;
      let focusSet = null;
      let gesture = null;
      let hasFitted = false;
      const view = { x: 0, y: 0, scale: 1 };

      document.body.dataset.mode = isPartitionMode ? "partition" : "key-file";
      document.querySelector(".brand p").textContent = isPartitionMode ? "AIG Partition Map" : "AIG Key Variable Map";
      document.getElementById("emphasize-cuts").closest(".check-control").hidden = !isPartitionMode;

      const bounds = DATA.nodes.reduce((result, node) => ({
        minX: Math.min(result.minX, node.x),
        maxX: Math.max(result.maxX, node.x),
        minY: Math.min(result.minY, node.y),
        maxY: Math.max(result.maxY, node.y),
      }), { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity });

      const typeNames = {
        input: "输入 PI",
        latch: "锁存器",
        and: "AND",
        variable: "变量",
        output: "输出 PO",
        constant: "常量",
      };

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, character => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
        })[character]);
      }

      function partitionColor(partition) {
        if (partition === null || partition === undefined) return "#87929d";
        return partitionPalette[Math.abs(Number(partition)) % partitionPalette.length];
      }

      function nodeColor(node) {
        if (node.isCutVariable) return "#d43f3f";
        if (node.excluded || node.type === "output" || node.type === "constant") return "#87929d";
        return partitionColor(node.partition);
      }

      function formatNodeLabel(node) {
        if (!node) return "?";
        return typeof node.id === "number" ? `v${node.id}` : node.label;
      }

      function setStatus(message) {
        statusElement.textContent = message;
      }

      function renderMetrics() {
        const metrics = isPartitionMode
          ? [
              [DATA.metrics.aigVariableCount, "AIG 变量"],
              [DATA.metrics.metisVertexCount, "METIS 顶点"],
              [keyVariables.length, "关键变量"],
              [DATA.metrics.cutEdgeCount, "跨区逻辑边"],
            ]
          : [
              [DATA.metrics.aigVariableCount, "AIG 变量"],
              [DATA.metrics.inputCount, "输入"],
              [DATA.metrics.andCount, "AND"],
              [keyVariables.length, "关键变量"],
            ];
        document.getElementById("metric-grid").innerHTML = metrics.map(([value, label]) =>
          `<div class="metric"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>`
        ).join("");
      }

      function renderLegend() {
        const rows = isPartitionMode
          ? Object.keys(DATA.partitionSizes)
              .sort((a, b) => Number(a) - Number(b))
              .map(partition => `<div class="legend-row"><span class="legend-swatch" style="background:${partitionColor(partition)}"></span>分区 ${escapeHtml(partition)} (${escapeHtml(DATA.partitionSizes[partition])})</div>`)
          : [`<div class="legend-row"><span class="legend-swatch" style="background:#87929d"></span>普通 AIG 变量</div>`];
        rows.push(`<div class="legend-row"><span class="legend-swatch" style="background:#d43f3f"></span>关键变量</div>`);
        if (isPartitionMode) rows.push(`<div class="legend-row"><span class="legend-line"></span>跨分区逻辑边</div>`);
        rows.push(`<div class="legend-row"><span class="legend-swatch" style="background:#87929d"></span>${isPartitionMode ? "不参与划分 / PO" : "PO / 常量"}</div>`);
        document.getElementById("legend-list").innerHTML = rows.join("");
      }

      function renderKeyList() {
        document.getElementById("key-count").textContent = `(${keyVariables.length})`;
        document.getElementById("key-list").innerHTML = keyVariables.map(variable => {
          const node = nodeMap.get(keyOf(variable));
          const context = isPartitionMode && node && node.partition !== null ? `P${node.partition}` : "raw AIG";
          return `<button class="key-row" type="button" data-node-id="${escapeHtml(variable)}"><strong>v${escapeHtml(variable)}</strong><span>${escapeHtml(context)}</span></button>`;
        }).join("");
      }

      function connectionMarkup(edge, direction) {
        const otherId = direction === "in" ? edge.source : edge.target;
        const otherNode = nodeMap.get(keyOf(otherId));
        const inversion = direction === "in" && edge.inverted ? "!" : "";
        const cutClass = edge.isCut ? " cut" : "";
        return `<button type="button" class="connection-button${cutClass}" data-node-id="${escapeHtml(keyOf(otherId))}" title="${escapeHtml(edge.kind)}">${inversion}${escapeHtml(formatNodeLabel(otherNode))}</button>`;
      }

      function renderSelectedDetail() {
        if (!selectedId || !nodeMap.has(selectedId)) {
          detailElement.innerHTML = `<p class="empty-detail">点击节点或搜索变量编号。</p>`;
          return;
        }
        const node = nodeMap.get(selectedId);
        const inEdges = incoming.get(selectedId) || [];
        const outEdges = outgoing.get(selectedId) || [];
        const partition = node.partition === null || node.partition === undefined ? "不参与划分" : `P${node.partition}`;
        const badge = node.isCutVariable ? `<span class="status-badge critical">关键变量</span>` : `<span class="status-badge">${isPartitionMode && node.excluded ? "已排除" : "普通变量"}</span>`;
        const literalText = typeof node.id === "number" ? `${node.id * 2} / ${node.id * 2 + 1}` : "-";
        const partitionDetail = isPartitionMode ? `<div><span class="detail-label">分区</span><span class="detail-value">${escapeHtml(partition)}</span></div>` : "";
        detailElement.innerHTML = `
          <div class="detail-title"><strong>${escapeHtml(formatNodeLabel(node))}</strong>${badge}</div>
          <div class="detail-grid">
            <div><span class="detail-label">类型</span><span class="detail-value">${escapeHtml(typeNames[node.type] || node.type)}</span></div>
            ${partitionDetail}
            <div><span class="detail-label">逻辑层</span><span class="detail-value">${escapeHtml(node.level)}</span></div>
            <div><span class="detail-label">literal (正/反)</span><span class="detail-value">${escapeHtml(literalText)}</span></div>
          </div>
          <div class="connection-group"><h3>FANIN (${inEdges.length})</h3><div class="connection-list">${inEdges.length ? inEdges.map(edge => connectionMarkup(edge, "in")).join("") : "<span class=\"detail-label\">无</span>"}</div></div>
          <div class="connection-group"><h3>FANOUT (${outEdges.length})</h3><div class="connection-list">${outEdges.length ? outEdges.map(edge => connectionMarkup(edge, "out")).join("") : "<span class=\"detail-label\">无</span>"}</div></div>
        `;
      }

      function updateFocusSet() {
        if (!selectedId || focusDepth === 0) {
          focusSet = null;
          return;
        }
        focusSet = new Set([selectedId]);
        let frontier = new Set([selectedId]);
        for (let depth = 0; depth < focusDepth; depth += 1) {
          const next = new Set();
          for (const id of frontier) {
            for (const neighbor of adjacency.get(id) || []) {
              if (!focusSet.has(neighbor)) next.add(neighbor);
              focusSet.add(neighbor);
            }
          }
          frontier = next;
        }
      }

      function isFocused(id) {
        return !focusSet || focusSet.has(keyOf(id));
      }

      function radiusForNode(node) {
        const minimumScreenRadius = node.isCutVariable ? 4.2 : 2.7;
        const base = node.isCutVariable ? 7 : 5;
        return Math.max(base, minimumScreenRadius / view.scale);
      }

      function drawNodeShape(node, radius) {
        const x = node.x;
        const y = node.y;
        ctx.beginPath();
        if (node.type === "and") {
          ctx.rect(x - radius, y - radius, radius * 2, radius * 2);
        } else if (node.type === "latch" || node.type === "constant") {
          ctx.moveTo(x, y - radius * 1.2);
          ctx.lineTo(x + radius * 1.2, y);
          ctx.lineTo(x, y + radius * 1.2);
          ctx.lineTo(x - radius * 1.2, y);
          ctx.closePath();
        } else if (node.type === "output") {
          ctx.moveTo(x + radius * 1.35, y);
          ctx.lineTo(x - radius, y - radius);
          ctx.lineTo(x - radius, y + radius);
          ctx.closePath();
        } else {
          ctx.arc(x, y, radius, 0, Math.PI * 2);
        }
      }

      function edgeEndpoint(edge, endpoint) {
        return nodeMap.get(keyOf(edge[endpoint]));
      }

      function drawArrow(edge, source, target, color, alpha) {
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const distance = Math.hypot(dx, dy) || 1;
        const ux = dx / distance;
        const uy = dy / distance;
        const targetRadius = radiusForNode(target) * 1.15;
        const endX = target.x - ux * targetRadius;
        const endY = target.y - uy * targetRadius;

        ctx.beginPath();
        ctx.moveTo(source.x, source.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        const selectedEdge = selectedId && (keyOf(edge.source) === selectedId || keyOf(edge.target) === selectedId);
        if (view.scale > 0.48 || selectedEdge) {
          const arrowSize = Math.max(4.5, 4.5 / view.scale);
          ctx.beginPath();
          ctx.moveTo(endX, endY);
          ctx.lineTo(endX - ux * arrowSize - uy * arrowSize * 0.55, endY - uy * arrowSize + ux * arrowSize * 0.55);
          ctx.lineTo(endX - ux * arrowSize + uy * arrowSize * 0.55, endY - uy * arrowSize - ux * arrowSize * 0.55);
          ctx.closePath();
          ctx.fillStyle = color;
          ctx.globalAlpha = alpha;
          ctx.fill();
        }

        if (edge.inverted && (view.scale > 0.55 || selectedEdge)) {
          const bubbleRadius = Math.max(2.2, 2.2 / view.scale);
          const bubbleX = endX - ux * bubbleRadius * 1.4;
          const bubbleY = endY - uy * bubbleRadius * 1.4;
          ctx.beginPath();
          ctx.arc(bubbleX, bubbleY, bubbleRadius, 0, Math.PI * 2);
          ctx.fillStyle = "#ffffff";
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.stroke();
        }
      }

      function draw() {
        ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
        ctx.clearRect(0, 0, cssWidth, cssHeight);
        ctx.fillStyle = "#eef2f5";
        ctx.fillRect(0, 0, cssWidth, cssHeight);
        ctx.save();
        ctx.translate(view.x, view.y);
        ctx.scale(view.scale, view.scale);

        const emphasizeCuts = document.getElementById("emphasize-cuts").checked;
        for (const edge of DATA.edges) {
          const source = edgeEndpoint(edge, "source");
          const target = edgeEndpoint(edge, "target");
          if (!source || !target) continue;
          const inFocus = isFocused(source.id) && isFocused(target.id);
          const selectedEdge = selectedId && (keyOf(source.id) === selectedId || keyOf(target.id) === selectedId);
          const isStrongCut = edge.isCut && emphasizeCuts;
          const color = isStrongCut ? "#d43f3f" : edge.isOutput ? "#7f8a94" : "#61707d";
          const alpha = !inFocus ? 0.025 : isStrongCut ? 0.88 : selectedEdge ? 0.58 : edge.isOutput ? 0.42 : 0.13;
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = color;
          ctx.fillStyle = color;
          ctx.lineWidth = isStrongCut ? Math.max(1.6, 1.35 / view.scale) : Math.max(0.55, 0.55 / view.scale);
          ctx.setLineDash(edge.isOutput ? [8 / view.scale, 5 / view.scale] : []);
          drawArrow(edge, source, target, color, alpha);
        }
        ctx.setLineDash([]);

        const showLabels = document.getElementById("show-labels").checked;
        for (const node of DATA.nodes) {
          const screenX = node.x * view.scale + view.x;
          const screenY = node.y * view.scale + view.y;
          if (screenX < -30 || screenX > cssWidth + 30 || screenY < -30 || screenY > cssHeight + 30) continue;
          const focused = isFocused(node.id);
          const radius = radiusForNode(node);
          ctx.globalAlpha = focused ? 1 : 0.09;
          drawNodeShape(node, radius);
          ctx.fillStyle = nodeColor(node);
          ctx.fill();
          ctx.strokeStyle = node.isCutVariable ? "#8f2424" : "rgba(23, 33, 43, 0.58)";
          ctx.lineWidth = Math.max(0.8, 0.8 / view.scale);
          ctx.stroke();

          const key = keyOf(node.id);
          if (key === selectedId || key === hoveredId) {
            drawNodeShape(node, radius + Math.max(3, 3 / view.scale));
            ctx.strokeStyle = key === selectedId ? "#111820" : "#155e75";
            ctx.lineWidth = Math.max(2.2, 2.2 / view.scale);
            ctx.stroke();
          }

          const shouldLabel = showLabels && (key === selectedId || view.scale > 0.62 || (node.isCutVariable && view.scale > 0.34));
          if (shouldLabel && focused) {
            const fontSize = 11 / view.scale;
            ctx.globalAlpha = 0.96;
            ctx.font = `650 ${fontSize}px ui-sans-serif, system-ui, sans-serif`;
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#17212b";
            ctx.fillText(node.label, node.x + radius + 4 / view.scale, node.y);
          }
        }
        ctx.restore();
        ctx.globalAlpha = 1;
      }

      function resizeCanvas() {
        const rect = shell.getBoundingClientRect();
        cssWidth = Math.max(1, rect.width);
        cssHeight = Math.max(1, rect.height);
        pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(cssWidth * pixelRatio);
        canvas.height = Math.round(cssHeight * pixelRatio);
        if (!hasFitted) {
          fitGraph();
          hasFitted = true;
        } else {
          draw();
        }
      }

      function fitGraph() {
        const padding = 54;
        const width = Math.max(bounds.maxX - bounds.minX, 1);
        const height = Math.max(bounds.maxY - bounds.minY, 1);
        view.scale = Math.max(0.02, Math.min((cssWidth - padding * 2) / width, (cssHeight - padding * 2) / height, 1.4));
        view.x = cssWidth / 2 - ((bounds.minX + bounds.maxX) / 2) * view.scale;
        view.y = cssHeight / 2 - ((bounds.minY + bounds.maxY) / 2) * view.scale;
        draw();
        setStatus(`全图 · ${DATA.nodes.length} 个可视节点 · ${DATA.edges.length} 条原始有向边`);
      }

      function zoomAt(factor, screenX = cssWidth / 2, screenY = cssHeight / 2) {
        const previous = view.scale;
        const next = Math.min(8, Math.max(0.02, previous * factor));
        const worldX = (screenX - view.x) / previous;
        const worldY = (screenY - view.y) / previous;
        view.scale = next;
        view.x = screenX - worldX * next;
        view.y = screenY - worldY * next;
        draw();
      }

      function centerOnNode(node) {
        view.scale = Math.max(view.scale, 1.15);
        view.x = cssWidth / 2 - node.x * view.scale;
        view.y = cssHeight / 2 - node.y * view.scale;
      }

      function selectNode(id, center = false) {
        const key = keyOf(id);
        const node = nodeMap.get(key);
        if (!node) return false;
        selectedId = key;
        if (center) centerOnNode(node);
        updateFocusSet();
        renderSelectedDetail();
        draw();
        const context = isPartitionMode ? (node.partition === null || node.partition === undefined ? "不参与划分" : `分区 ${node.partition}`) : "原始 AIG";
        setStatus(`${formatNodeLabel(node)} · ${typeNames[node.type] || node.type} · ${context}${node.isCutVariable ? " · 关键变量" : ""}`);
        return true;
      }

      function hitTest(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        let best = null;
        let bestDistance = 12;
        for (const node of DATA.nodes) {
          const dx = node.x * view.scale + view.x - x;
          const dy = node.y * view.scale + view.y - y;
          const distance = Math.hypot(dx, dy);
          if (distance < bestDistance) {
            bestDistance = distance;
            best = node;
          }
        }
        return best;
      }

      function updateTooltip(node, clientX, clientY) {
        if (!node) {
          tooltip.hidden = true;
          return;
        }
        const rect = shell.getBoundingClientRect();
        const context = isPartitionMode ? (node.partition === null || node.partition === undefined ? "未划分" : `P${node.partition}`) : "原始 AIG";
        tooltip.textContent = `${formatNodeLabel(node)} · ${typeNames[node.type] || node.type} · ${context}${node.isCutVariable ? " · 关键变量" : ""}`;
        tooltip.style.left = `${Math.min(clientX - rect.left + 12, rect.width - 250)}px`;
        tooltip.style.top = `${Math.max(8, clientY - rect.top + 12)}px`;
        tooltip.hidden = false;
      }

      canvas.addEventListener("pointerdown", event => {
        canvas.setPointerCapture(event.pointerId);
        gesture = { pointerId: event.pointerId, x: event.clientX, y: event.clientY, viewX: view.x, viewY: view.y, moved: false };
        canvas.classList.add("dragging");
        tooltip.hidden = true;
      });

      canvas.addEventListener("pointermove", event => {
        if (gesture && gesture.pointerId === event.pointerId) {
          const dx = event.clientX - gesture.x;
          const dy = event.clientY - gesture.y;
          if (Math.hypot(dx, dy) > 3) gesture.moved = true;
          view.x = gesture.viewX + dx;
          view.y = gesture.viewY + dy;
          draw();
          return;
        }
        const node = hitTest(event.clientX, event.clientY);
        const nextHovered = node ? keyOf(node.id) : null;
        if (nextHovered !== hoveredId) {
          hoveredId = nextHovered;
          draw();
        }
        updateTooltip(node, event.clientX, event.clientY);
      });

      function finishPointer(event) {
        if (!gesture || gesture.pointerId !== event.pointerId) return;
        if (!gesture.moved) {
          const node = hitTest(event.clientX, event.clientY);
          if (node) selectNode(node.id, false);
        }
        gesture = null;
        canvas.classList.remove("dragging");
      }

      canvas.addEventListener("pointerup", finishPointer);
      canvas.addEventListener("pointercancel", finishPointer);
      canvas.addEventListener("pointerleave", () => { if (!gesture) { hoveredId = null; tooltip.hidden = true; draw(); } });
      canvas.addEventListener("wheel", event => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        zoomAt(event.deltaY < 0 ? 1.18 : 1 / 1.18, event.clientX - rect.left, event.clientY - rect.top);
      }, { passive: false });

      document.getElementById("search-form").addEventListener("submit", event => {
        event.preventDefault();
        const value = document.getElementById("variable-search").value.trim();
        if (!/^\d+$/.test(value) || !selectNode(Number(value), true)) {
          setStatus(`没有找到 AIG 变量 ${value || "?"}`);
          return;
        }
      });

      document.getElementById("key-list").addEventListener("click", event => {
        const button = event.target.closest("[data-node-id]");
        if (button) selectNode(button.dataset.nodeId, true);
      });

      detailElement.addEventListener("click", event => {
        const button = event.target.closest("[data-node-id]");
        if (button) selectNode(button.dataset.nodeId, true);
      });

      document.getElementById("zoom-in").addEventListener("click", () => zoomAt(1.25));
      document.getElementById("zoom-out").addEventListener("click", () => zoomAt(0.8));
      document.getElementById("fit-view").addEventListener("click", fitGraph);
      document.getElementById("reset-view").addEventListener("click", () => {
        selectedId = null;
        focusDepth = 0;
        focusSet = null;
        document.querySelectorAll("#focus-control button").forEach(button => button.classList.toggle("active", button.dataset.depth === "0"));
        renderSelectedDetail();
        fitGraph();
      });
      document.getElementById("show-labels").addEventListener("change", draw);
      document.getElementById("emphasize-cuts").addEventListener("change", draw);

      document.getElementById("focus-control").addEventListener("click", event => {
        const button = event.target.closest("button[data-depth]");
        if (!button) return;
        focusDepth = Number(button.dataset.depth);
        if (focusDepth > 0 && !selectedId && keyVariables.length) selectNode(keyVariables[0], false);
        updateFocusSet();
        document.querySelectorAll("#focus-control button").forEach(item => item.classList.toggle("active", item === button));
        draw();
        if (selectedId && focusDepth > 0) setStatus(`${formatNodeLabel(nodeMap.get(selectedId))} · ${focusDepth}-hop 邻域聚焦`);
      });

      document.getElementById("drawer-toggle").addEventListener("click", () => document.body.classList.toggle("drawer-open"));
      window.addEventListener("resize", resizeCanvas);

      renderMetrics();
      renderLegend();
      renderKeyList();
      renderSelectedDetail();
      resizeCanvas();

      window.__AIG_VISUALIZATION__ = {
        data: DATA,
        fitGraph,
        selectNode,
        getState: () => ({ selectedId, focusDepth, scale: view.scale, focusCount: focusSet ? focusSet.size : DATA.nodes.length }),
      };
      document.body.dataset.ready = "true";
    })();
  </script>
</body>
</html>
